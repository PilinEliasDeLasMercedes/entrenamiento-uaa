<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAA AI Trainer | EXANI-II Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid #e2e8f0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .locked { filter: grayscale(1); opacity: 0.4; pointer-events: none; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased pb-20">

<div id="app" class="max-w-6xl mx-auto px-4 pt-6">
    <div id="api-panel" class="mb-8 p-6 bg-slate-900 rounded-3xl shadow-xl text-white flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-4">
            <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
            <div>
                <h2 class="font-bold text-lg leading-tight">Estado de la IA</h2>
                <p id="status-text" class="text-xs text-slate-400 font-medium">Clave no detectada</p>
            </div>
        </div>
        <div class="relative w-full md:w-auto flex gap-2">
            <input type="password" id="user-api-key" placeholder="Pega tu clave de Gemini aquí..." 
                   class="w-full md:w-80 px-5 py-3 rounded-2xl bg-white/10 border border-white/20 text-sm focus:outline-none focus:bg-white/20 transition-all">
            <button onclick="saveKey()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-bold hover:bg-blue-700 transition-all">Guardar</button>
        </div>
    </div>

    <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter">EXANI-II Master</h1>
            <p class="text-slate-500 mt-1 uppercase text-xs font-bold tracking-[0.2em]">Ingeniería Automotriz UAA</p>
        </div>
        <div class="flex gap-4">
            <div class="glass-card px-6 py-4 rounded-3xl shadow-sm text-center min-w-[120px]">
                <span id="global-score" class="text-3xl font-black text-blue-600">0</span>
                <p class="text-[10px] uppercase text-slate-400 font-bold mt-1 tracking-widest">Aciertos</p>
            </div>
            <div class="glass-card px-6 py-4 rounded-3xl shadow-sm text-center min-w-[120px]">
                <span id="difficulty-display" class="text-3xl font-black text-indigo-600">1</span>
                <p class="text-[10px] uppercase text-slate-400 font-bold mt-1 tracking-widest">Nivel IA</p>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        <div class="lg:col-span-4">
            <div class="glass-card p-8 rounded-[2.5rem] sticky top-6 shadow-sm">
                <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <span class="w-2 h-5 bg-blue-600 rounded-full"></span>
                    Habilidades
                </h3>
                <div class="h-[300px]">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-12">
            <div id="weeks-container" class="space-y-12"></div>
        </div>
    </div>
</div>

<div id="exam-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-3xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
        <div class="px-10 py-8 border-b border-slate-100 flex justify-between items-center">
            <h3 id="modal-title" class="text-2xl font-black text-slate-900 truncate">Examen</h3>
            <button onclick="closeExam()" class="text-slate-400 text-3xl">&times;</button>
        </div>
        
        <div id="modal-body" class="p-10 overflow-y-auto flex-grow">
            <div id="exam-loading" class="flex flex-col items-center justify-center py-20 text-center">
                <div class="loader mb-6 w-10 h-10 border-t-blue-600"></div>
                <p id="loading-msg" class="text-slate-500 font-medium">Invocando Inteligencia Artificial...</p>
                <div id="error-console" class="hidden mt-6 p-4 bg-red-50 border border-red-100 rounded-2xl text-left text-xs font-mono text-red-600 w-full max-w-md">
                    <p class="font-bold mb-1 underline text-[10px]">DETALLES TÉCNICOS DEL ERROR:</p>
                    <p id="error-text" class="break-words"></p>
                    <p class="mt-2 text-[9px] text-red-400 italic">Verifica que tu clave en el panel superior sea la correcta.</p>
                </div>
            </div>
            <div id="questions-container" class="hidden space-y-10 animate-fade"></div>
        </div>

        <div id="modal-footer" class="px-10 py-8 border-t border-slate-50 hidden flex justify-between items-center bg-slate-50/50">
            <span id="progress-text" class="text-xs font-black text-slate-400 uppercase tracking-widest"></span>
            <button id="next-btn" onclick="handleNext()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-blue-100 disabled:opacity-50">
                Siguiente
            </button>
        </div>
    </div>
</div>

<script>
    const plan = [
        { week: 1, title: "Pensamiento Matemático", color: "blue", focus: "Aritmética", days: ["Razones y Proporciones", "Sucesiones", "Porcentajes", "Probabilidad", "Álgebra"] },
        { week: 2, title: "Pensamiento Científico", color: "indigo", focus: "Física", days: ["MRUA", "Leyes de Newton", "Estática", "Energía", "Óptica"] },
        { week: 3, title: "Cálculo y Razonamiento", color: "emerald", focus: "Cálculo", days: ["Límites", "Derivadas", "Optimización", "Integrales", "Geometría"] },
        { week: 4, title: "Estructura del Lenguaje", color: "purple", focus: "Redacción", days: ["Concordancia", "Vicios", "Análisis Textual", "Vocabulario", "Inglés"] }
    ];

    let userStats = JSON.parse(localStorage.getItem('uaa_stats_v3')) || { 'Física': 10, 'Cálculo': 10, 'Aritmética': 10, 'Comprensión': 10, 'Redacción': 10, 'Lógica': 10 };
    let completedExams = JSON.parse(localStorage.getItem('uaa_completed_v3')) || {};
    let aiDifficulty = parseInt(localStorage.getItem('uaa_diff_v3')) || 1;
    let currentQuestions = [];
    let currentStep = 0;
    let currentAnswers = [];
    let currentExamKey = "";
    let currentCategory = "";
    let radarChart;

    function saveKey() {
        const keyInput = document.getElementById('user-api-key').value.trim();
        if(keyInput) {
            localStorage.setItem('uaa_key_v3', keyInput);
            updateAPIStatus(true);
            alert("✅ API Key guardada con éxito.");
        }
    }

    function updateAPIStatus(active) {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        if(active) {
            dot.className = "w-3 h-3 bg-green-500 rounded-full";
            text.textContent = "IA Lista para generar exámenes";
        } else {
            dot.className = "w-3 h-3 bg-red-500 rounded-full animate-pulse";
            text.textContent = "Esperando API Key válida...";
        }
    }

    function initRadar() {
        const ctx = document.getElementById('radarChart').getContext('2d');
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: Object.keys(userStats),
                datasets: [{ label: 'Nivel', data: Object.values(userStats), backgroundColor: 'rgba(37, 99, 235, 0.1)', borderColor: '#2563eb', borderWidth: 2, pointRadius: 3 }]
            },
            options: { scales: { r: { min: 0, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });
    }

    function isLocked(wIdx, dIdx) {
        if (wIdx === 0 && dIdx === 0) return false;
        let pD = dIdx - 1; let pW = wIdx;
        if (pD < 0) { pW = wIdx - 1; pD = 4; }
        for (let e = 1; e <= 5; e++) { if (!completedExams[`w${pW+1}-d${pD+1}-e${e}`]) return true; }
        return false;
    }

    function renderPlan() {
        const container = document.getElementById('weeks-container');
        container.innerHTML = "";
        plan.forEach((w, wIdx) => {
            const weekLocked = isLocked(wIdx, 0);
            const weekEl = document.createElement('div');
            weekEl.className = weekLocked ? 'locked' : 'animate-fade';
            weekEl.innerHTML = `
                <h3 class="font-black text-2xl text-slate-800 mb-6 flex items-center gap-3">
                    <span class="text-slate-200">S${w.week}</span> ${w.title}
                </h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4">
                    ${w.days.map((day, dIdx) => {
                        const dayLocked = isLocked(wIdx, dIdx);
                        return `
                        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm ${dayLocked ? 'opacity-30' : ''}">
                            <p class="text-[10px] font-black text-blue-600 mb-2 uppercase tracking-widest">DÍA ${dIdx+1}</p>
                            <h4 class="text-xs font-bold text-slate-800 h-8 leading-tight mb-4">${day}</h4>
                            <div class="flex flex-col gap-1.5">
                                ${[1,2,3,4,5].map(e => {
                                    const key = `w${w.week}-d${dIdx+1}-e${e}`;
                                    const done = completedExams[key];
                                    const prevE = e > 1 ? completedExams[`w${w.week}-d${dIdx+1}-e${e-1}`] : true;
                                    const canPlay = !dayLocked && prevE;
                                    return `<button onclick="${canPlay ? `startExam('${day}', '${w.focus}', '${key}')` : ''}" 
                                        class="w-full py-2 rounded-xl text-[10px] font-black border transition-all 
                                        ${done ? 'bg-emerald-500 border-emerald-500 text-white' : 
                                          canPlay ? 'bg-white border-slate-200 text-slate-600 hover:border-blue-600 hover:text-blue-600' : 
                                          'bg-slate-50 border-slate-50 text-slate-300 cursor-not-allowed'}">
                                        LVL ${e} ${done ? '✓' : ''}
                                    </button>`;
                                }).join('')}
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
            container.appendChild(weekEl);
        });
        document.getElementById('difficulty-display').textContent = aiDifficulty;
        document.getElementById('global-score').textContent = localStorage.getItem('uaa_score_v3') || 0;
    }

    async function startExam(theme, category, key) {
        const apiK = localStorage.getItem('uaa_key_v3') || document.getElementById('user-api-key').value.trim();
        if (!apiK) { alert("⚠️ Primero ingresa tu API Key."); return; }

        currentExamKey = key; currentCategory = category;
        document.getElementById('exam-modal').classList.remove('hidden');
        document.getElementById('exam-loading').classList.remove('hidden');
        document.getElementById('error-console').classList.add('hidden');
        document.getElementById('questions-container').classList.add('hidden');
        document.getElementById('modal-footer').classList.add('hidden');
        document.getElementById('modal-title').textContent = theme;

        const prompt = `Actúa como profesor EXANI-II UAA. Genera 15 preguntas de opción múltiple (A, B, C, D) sobre "${theme}" (${category}) con dificultad ${aiDifficulty}/10. 
        Importante: Responde ÚNICAMENTE con un JSON válido: { "questions": [ { "q": "Pregunta", "options": ["A", "B", "C", "D"], "correct": 0 } ] }`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiK}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            if (data.error) throw new Error(`${data.error.status}: ${data.error.message}`);

            const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
            currentQuestions = JSON.parse(text).questions;
            currentStep = 0; currentAnswers = [];
            showQuestion();
        } catch (e) {
            document.getElementById('loading-msg').textContent = "❌ No se pudo generar el examen";
            document.getElementById('error-console').classList.remove('hidden');
            document.getElementById('error-text').textContent = e.message;
        }
    }

    function showQuestion() {
        document.getElementById('exam-loading').classList.add('hidden');
        const container = document.getElementById('questions-container');
        container.classList.remove('hidden');
        document.getElementById('modal-footer').classList.remove('hidden');
        const q = currentQuestions[currentStep];
        container.innerHTML = `
            <div class="mb-6"><span class="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-lg">REACTIVO ${currentStep + 1}/15</span></div>
            <h4 class="text-xl font-bold text-slate-800 mb-8">${q.q}</h4>
            <div class="grid grid-cols-1 gap-4">
                ${q.options.map((o, i) => `<button onclick="selectOption(${i})" id="opt-${i}" class="p-6 text-left rounded-2xl border-2 border-slate-100 hover:border-blue-500 font-bold transition-all text-slate-700 flex justify-between items-center group">
                    ${o} <div class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
                </button>`).join('')}
            </div>`;
        document.getElementById('progress-text').textContent = `PREGUNTA ${currentStep+1} de 15`;
    }

    let selectedIdx = -1;
    function selectOption(idx) {
        selectedIdx = idx;
        document.querySelectorAll('[id^="opt-"]').forEach(b => {
            b.classList.remove('border-blue-600', 'bg-blue-50');
            b.querySelector('div').classList.remove('bg-blue-600', 'border-blue-600');
        });
        const active = document.getElementById(`opt-${idx}`);
        active.classList.add('border-blue-600', 'bg-blue-50');
        active.querySelector('div').classList.add('bg-blue-600', 'border-blue-600');
    }

    function handleNext() {
        if (selectedIdx === -1) return;
        currentAnswers.push(selectedIdx); selectedIdx = -1;
        if (currentStep < 14) { currentStep++; showQuestion(); } else { finishExam(); }
    }

    function finishExam() {
        let correct = 0;
        currentQuestions.forEach((q, i) => { if (q.correct === currentAnswers[i]) correct++; });
        
        if (correct >= 12) aiDifficulty = Math.min(10, aiDifficulty + 1);
        else if (correct < 7) aiDifficulty = Math.max(1, aiDifficulty - 1);

        const map = { 'Aritmética': ['Aritmética', 'Lógica'], 'Física': ['Física'], 'Cálculo': ['Cálculo'], 'Redacción': ['Redacción', 'Comprensión'] };
        (map[currentCategory] || []).forEach(k => { userStats[k] = Math.min(100, userStats[k] + (correct * 0.4)); });

        completedExams[currentExamKey] = true;
        localStorage.setItem('uaa_stats_v3', JSON.stringify(userStats));
        localStorage.setItem('uaa_completed_v3', JSON.stringify(completedExams));
        localStorage.setItem('uaa_diff_v3', aiDifficulty);
        localStorage.setItem('uaa_score_v3', (parseInt(localStorage.getItem('uaa_score_v3') || 0) + correct).toString());

        closeExam(); renderPlan();
        radarChart.data.datasets[0].data = Object.values(userStats); radarChart.update();
    }

    function closeExam() { document.getElementById('exam-modal').classList.add('hidden'); }

    window.onload = () => {
        const key = localStorage.getItem('uaa_key_v3');
        if(key) {
            document.getElementById('user-api-key').value = key;
            updateAPIStatus(true);
        }
        initRadar(); renderPlan();
    };
</script>
</body>
</html>
