<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAA Master | Conexión Estable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid #e2e8f0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-locked { background-color: #f1f5f9; color: #cbd5e1; border-color: #f1f5f9; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="antialiased pb-20">

<div id="app" class="max-w-6xl mx-auto px-4 pt-6">
    <!-- Panel de Control de API -->
    <div class="mb-8 p-6 bg-slate-900 rounded-3xl shadow-xl text-white flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-4">
            <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
            <div>
                <h2 class="font-bold text-lg leading-tight">Estado de la IA</h2>
                <p id="status-text" class="text-xs text-slate-400">Verificando conexión...</p>
            </div>
        </div>
        <div class="flex gap-2 w-full md:w-auto">
            <input type="password" id="user-api-key" placeholder="Pega tu API Key de Gemini..." 
                   class="w-full md:w-80 px-5 py-3 rounded-2xl bg-white/10 border border-white/20 text-sm focus:outline-none focus:bg-white/20 transition-all">
            <button onclick="saveKey()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-bold hover:bg-blue-700 transition-all">Activar IA</button>
        </div>
    </div>

    <header class="mb-10 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tighter">UAA Master</h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Preparación EXANI-II | Nivel: <span id="diff-val">1</span></p>
        </div>
        <div class="glass-card px-6 py-4 rounded-3xl text-center shadow-sm">
            <span id="global-score" class="text-3xl font-black text-blue-600">0</span>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Puntos Acumulados</p>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
        <div class="lg:col-span-4">
            <div class="glass-card p-8 rounded-[2.5rem] sticky top-6 shadow-sm">
                <canvas id="radarChart"></canvas>
            </div>
        </div>
        <div class="lg:col-span-8">
            <div id="weeks-container" class="space-y-10"></div>
        </div>
    </div>
</div>

<!-- Modal de Examen -->
<div id="exam-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-3xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
        <div class="px-10 py-8 border-b flex justify-between items-center">
            <h3 id="modal-title" class="text-2xl font-black text-slate-900">Examen UAA</h3>
            <button onclick="closeExam()" class="text-slate-400 text-3xl">&times;</button>
        </div>
        <div id="modal-body" class="p-10 overflow-y-auto flex-grow">
            <div id="exam-loading" class="text-center py-10">
                <div class="loader mx-auto mb-6"></div>
                <p id="loading-msg" class="text-slate-600 font-medium">Conectando con Google AI...</p>
                <div id="error-console" class="hidden mt-6 p-4 bg-red-50 border border-red-100 rounded-2xl text-left text-xs font-mono text-red-600">
                    <p class="font-bold mb-1 underline uppercase">Error de API:</p>
                    <p id="error-text"></p>
                    <p class="mt-2 text-slate-500 italic font-sans text-[10px]">Solución: Revisa que tu API Key sea de Google AI Studio y no de Google Cloud.</p>
                </div>
            </div>
            <div id="questions-container" class="hidden space-y-8"></div>
        </div>
        <div id="modal-footer" class="px-10 py-8 border-t hidden flex justify-between items-center bg-slate-50">
            <span id="progress-text" class="text-xs font-black text-slate-400 uppercase"></span>
            <button id="next-btn" onclick="handleNext()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg">Siguiente Pregunta</button>
        </div>
    </div>
</div>

<script>
    const plan = [
        { week: 1, title: "Pensamiento Matemático", days: ["Razones y Proporciones", "Sucesiones", "Porcentajes", "Probabilidad", "Álgebra"], focus: "Aritmética" },
        { week: 2, title: "Pensamiento Científico", days: ["Cinemática", "Dinámica", "Termodinámica", "Química", "Biología"], focus: "Física" }
    ];

    let userStats = JSON.parse(localStorage.getItem('uaa_stats_v6')) || { 'Física': 10, 'Cálculo': 10, 'Aritmética': 10, 'Comprensión': 10, 'Redacción': 10, 'Lógica': 10 };
    let completedExams = JSON.parse(localStorage.getItem('uaa_completed_v6')) || {};
    let aiDifficulty = parseInt(localStorage.getItem('uaa_diff_v6')) || 1;
    let currentQuestions = [];
    let currentStep = 0;
    let currentAnswers = [];
    let currentExamKey = "";
    let radarChart;

    function saveKey() {
        const val = document.getElementById('user-api-key').value.trim();
        if(val) { 
            localStorage.setItem('uaa_key_v6', val); 
            updateStatus(true); 
            alert("✅ Clave guardada localmente.");
            location.reload();
        }
    }

    function updateStatus(ok) {
        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        if(ok) {
            dot.className = "w-3 h-3 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]";
            txt.textContent = "IA Conectada satisfactoriamente";
        } else {
            dot.className = "w-3 h-3 bg-red-500 rounded-full animate-pulse";
            txt.textContent = "API Key requerida para funcionar";
        }
    }

    function initRadar() {
        const ctx = document.getElementById('radarChart').getContext('2d');
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: { labels: Object.keys(userStats), datasets: [{ label: 'Nivel Actual', data: Object.values(userStats), backgroundColor: 'rgba(37, 99, 235, 0.1)', borderColor: '#2563eb', borderWidth: 2, pointBackgroundColor: '#2563eb' }] },
            options: { scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: '#e2e8f0' } } }, plugins: { legend: { display: false } } }
        });
    }

    function renderPlan() {
        const container = document.getElementById('weeks-container');
        container.innerHTML = "";
        plan.forEach((w, wIdx) => {
            const div = document.createElement('div');
            div.innerHTML = `<h3 class="font-black text-xl text-slate-800 mb-6 flex items-center gap-2"><span class="w-1.5 h-6 bg-blue-600 rounded-full"></span> Semana ${w.week}: ${w.title}</h3>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
                    ${w.days.map((day, dIdx) => {
                        let dayButtons = "";
                        for(let e = 1; e <= 5; e++) {
                            const k = `w${w.week}-d${dIdx+1}-e${e}`;
                            const prevK = `w${w.week}-d${dIdx+1}-e${e-1}`;
                            const done = completedExams[k];
                            // Desbloqueado si es Nivel 1 O si el anterior está hecho
                            const isUnlocked = e === 1 || completedExams[prevK];
                            
                            dayButtons += `<button onclick="startExam('${day}', '${w.focus}', '${k}')" 
                                ${!isUnlocked ? 'disabled' : ''}
                                class="w-full py-1.5 rounded-xl text-[9px] font-bold border transition-all 
                                ${!isUnlocked ? 'btn-locked' : (done ? 'bg-green-500 border-green-500 text-white' : 'text-slate-400 hover:border-blue-500 hover:text-blue-500')}">
                                NIVEL ${e} ${done ? '✓' : (!isUnlocked ? '🔒' : '')}
                            </button>`;
                        }
                        return `
                            <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                                <p class="text-[9px] font-black text-blue-500 mb-3 uppercase tracking-tighter">${day}</p>
                                <div class="space-y-1">
                                    ${dayButtons}
                                </div>
                            </div>`;
                    }).join('')}
                </div>`;
            container.appendChild(div);
        });
        document.getElementById('diff-val').textContent = aiDifficulty;
        document.getElementById('global-score').textContent = localStorage.getItem('uaa_score_v6') || 0;
    }

    async function startExam(theme, cat, key) {
        const apiK = localStorage.getItem('uaa_key_v6') || document.getElementById('user-api-key').value;
        if(!apiK) { alert("⚠️ Primero debes ingresar tu API Key."); return; }
        
        currentExamKey = key;
        document.getElementById('exam-modal').classList.remove('hidden');
        document.getElementById('exam-loading').classList.remove('hidden');
        document.getElementById('questions-container').classList.add('hidden');
        document.getElementById('error-console').classList.add('hidden');
        document.getElementById('modal-footer').classList.add('hidden');
        document.getElementById('modal-title').textContent = "Evaluación: " + theme;

        // FIXED: Using the specific supported model for this preview environment
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiK}`;
        
        const prompt = `Genera un examen EXANI-II de 15 preguntas JSON sobre "${theme}" (${cat}) con dificultad ${aiDifficulty}/10. 
        Importante: Responde SOLO con el JSON. Estructura: {"questions":[{"q":"pregunta","options":["A","B","C","D"],"correct":0}]}`;

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { 
                        temperature: 0.7,
                        responseMimeType: "application/json"
                    }
                })
            });

            const data = await res.json();
            
            if (data.error) {
                throw new Error(`${data.error.message}`);
            }

            const rawText = data.candidates[0].content.parts[0].text;
            const cleanedText = rawText.replace(/```json|```/g, "").trim();
            
            currentQuestions = JSON.parse(cleanedText).questions;
            currentStep = 0; currentAnswers = [];
            showQuestion();
        } catch(e) {
            document.getElementById('loading-msg').textContent = "Error al conectar con la IA";
            document.getElementById('error-console').classList.remove('hidden');
            document.getElementById('error-text').textContent = e.message;
            console.error(e);
        }
    }

    function showQuestion() {
        document.getElementById('exam-loading').classList.add('hidden');
        document.getElementById('questions-container').classList.remove('hidden');
        document.getElementById('modal-footer').classList.remove('hidden');
        const q = currentQuestions[currentStep];
        document.getElementById('questions-container').innerHTML = `
            <div class="mb-2"><span class="bg-blue-100 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full uppercase">Pregunta ${currentStep+1} de 15</span></div>
            <h4 class="font-bold text-xl text-slate-800 mb-8 leading-tight">${q.q}</h4>
            <div class="grid grid-cols-1 gap-4">${q.options.map((o, i) => `
                <button onclick="sel(${i})" id="o-${i}" class="w-full p-5 text-left border-2 border-slate-100 rounded-2xl hover:bg-blue-50 transition-all font-semibold text-slate-700 flex justify-between items-center group">
                    ${o} <div class="w-5 h-5 rounded-full border-2 border-slate-200"></div>
                </button>`).join('')}
            </div>`;
        document.getElementById('progress-text').textContent = `Progreso: ${Math.round(((currentStep+1)/15)*100)}%`;
    }

    let selectedIdx = -1;
    function sel(i) {
        selectedIdx = i;
        document.querySelectorAll('[id^="o-"]').forEach(b => {
            b.classList.remove('border-blue-600', 'bg-blue-50');
            b.querySelector('div').classList.remove('bg-blue-600', 'border-blue-600');
        });
        const active = document.getElementById(`o-${i}`);
        active.classList.add('border-blue-600', 'bg-blue-50');
        active.querySelector('div').classList.add('bg-blue-600', 'border-blue-600');
    }

    function handleNext() {
        if(selectedIdx === -1) return;
        currentAnswers.push(selectedIdx); selectedIdx = -1;
        if(currentStep < 14) { currentStep++; showQuestion(); } else { finish(); }
    }

    function finish() {
        let correctas = 0;
        currentQuestions.forEach((q, i) => { if(q.correct === currentAnswers[i]) correctas++; });
        
        if(correctas >= 13) aiDifficulty = Math.min(10, aiDifficulty + 1);
        
        completedExams[currentExamKey] = true;
        localStorage.setItem('uaa_completed_v6', JSON.stringify(completedExams));
        localStorage.setItem('uaa_diff_v6', aiDifficulty);
        localStorage.setItem('uaa_score_v6', (parseInt(localStorage.getItem('uaa_score_v6')||0) + correctas));
        
        closeExam(); renderPlan();
        alert(`¡Examen terminado! Aciertos: ${correctas}/15. ¡Siguiente nivel desbloqueado!`);
    }

    function closeExam() { document.getElementById('exam-modal').classList.add('hidden'); }

    window.onload = () => {
        const k = localStorage.getItem('uaa_key_v6');
        if(k) { document.getElementById('user-api-key').value = k; updateStatus(true); }
        initRadar(); renderPlan();
    }
</script>
</body>
</html>
